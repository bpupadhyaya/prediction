name: Prediction
options:
  bundleIdPrefix: com.equalinformation.prediction
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.equalinformation.prediction.app
    INFOPLIST_FILE: Prediction/App/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: 49DP7QRJZ6
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    SWIFT_VERSION: "5.9"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.27.0"

targets:
  Prediction:
    type: application
    platform: iOS
    sources:
      - path: Prediction/App
      - path: ../../domains/finance/projects/stock-market/development/software/ios/StockPrediction
        excludes:
          - "App/StockPredictionApp.swift"
    resources:
      - path: Prediction/Resources
    dependencies:
      - package: GRDB
    info:
      path: Prediction/App/Info.plist
      properties:
        CFBundleDisplayName: Prediction
        CFBundleIconName: AppIcon
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            alphavantage.co:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            finance.yahoo.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            polygon.io:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            stooq.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            twelvedata.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
