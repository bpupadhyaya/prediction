name: StockPrediction
options:
  bundleIdPrefix: com.prediction
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  StockPrediction:
    type: application
    platform: iOS
    sources:
      - StockPrediction
    resources:
      - path: StockPrediction/Resources
        excludes:
          - ".gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prediction.stockmarket
        INFOPLIST_FILE: StockPrediction/App/Info.plist
    dependencies:
      - package: GRDB
      - package: OnnxRuntimeGenAI
    info:
      path: StockPrediction/App/Info.plist
      properties:
        CFBundleDisplayName: Prediction
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            query1.finance.yahoo.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: false
            finance.yahoo.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            stooq.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            alphavantage.co:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            twelvedata.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
            polygon.io:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.27.0"
  OnnxRuntimeGenAI:
    url: https://github.com/microsoft/onnxruntime-genai
    from: "0.3.0"
