name: Deploy Interactive Predictor to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'domains/finance/projects/stock-market/development/software/pages/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: domains/finance/projects/stock-market/development/software/pages/package-lock.json

      - name: Install dependencies
        working-directory: domains/finance/projects/stock-market/development/software/pages
        run: npm ci

      - name: Build
        working-directory: domains/finance/projects/stock-market/development/software/pages
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: domains/finance/projects/stock-market/development/software/pages/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
